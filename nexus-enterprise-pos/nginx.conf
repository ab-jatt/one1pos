server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # SPA fallback: unknown paths served as index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-term cache for immutable hashed assets (JS, CSS chunks)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache the HTML entry point itself
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Lightweight healthcheck endpoint — no filesystem hit, no SPA routing.
    # Used by Docker HEALTHCHECK and load-balancer probes.
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }
}
